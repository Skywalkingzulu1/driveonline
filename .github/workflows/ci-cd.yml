name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Python (required for installing dependencies)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Install Python dependencies (optional, ensures build succeeds)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Configure AWS credentials from repository secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image, tag it, and push to ECR
      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: driveonline
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # Deploy to ECS using a simple blue‑green strategy
      - name: Deploy to ECS (Blue‑Green)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: driveonline
          IMAGE_TAG: ${{ github.sha }}
          CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
          SERVICE_BLUE: ${{ secrets.ECS_SERVICE_BLUE }}
          SERVICE_GREEN: ${{ secrets.ECS_SERVICE_GREEN }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "Updating Blue service ($SERVICE_BLUE) with image $IMAGE_URI"
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_BLUE \
            --force-new-deployment \
            --desired-count 1 \
            --region ${{ secrets.AWS_REGION }}

          echo "Updating Green service ($SERVICE_GREEN) with image $IMAGE_URI"
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_GREEN \
            --force-new-deployment \
            --desired-count 1 \
            --region ${{ secrets.AWS_REGION }}

          echo "Blue‑Green deployment triggered."