name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Determine image tag
        id: tag
        run: |
          # Use the git tag if present, otherwise fallback to a short SHA
          if git describe --tags --exact-match >/dev/null 2>&1; then
            TAG=$(git describe --tags --exact-match)
          else
            TAG=$(git rev-parse --short HEAD)
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ github.repository }}:${{ steps.tag.outputs.image_tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ github.repository }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ github.repository }}:buildcache,mode=max
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.tag.outputs.image_tag }}