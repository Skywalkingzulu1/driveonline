name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests.
      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings

      # Build Docker image.
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_REGISTRY_USERNAME }}/driveonline:${{ github.sha }} .

      # Log in to Docker Hub (or other registry).
      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      # Push Docker image.
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_REGISTRY_USERNAME }}/driveonline:${{ github.sha }}

      # Deploy to cloud (example using SSH to a remote server).
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY_USERNAME }}/driveonline:${{ github.sha }}
            docker stop driveonline || true
            docker rm driveonline || true
            docker run -d --name driveonline -p 80:80 ${{ secrets.DOCKER_REGISTRY_USERNAME }}/driveonline:${{ github.sha }}